name: Run build

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 19
          cache: 'gradle'

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run build
        run: ./gradlew clean build